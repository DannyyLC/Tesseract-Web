name: Sync to Personal Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'FractalOps-Dev/Tesseract'
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to personal repo
        run: |
          git config user.email "cervantesdaniellimon50m@gmail.com"
          git config user.name "DannyyLC"
          git remote add personal git@github.com:DannyyLC/Tesseract-Web.git
          git push personal main --force
