steps:
  # ── Gateway ──────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-gateway'
    args:
      - build
      - -f
      - apps/gateway/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/gateway:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/gateway:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-gateway-sha'
    waitFor: ['build-gateway']
    args:
      - push
      - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/gateway:$COMMIT_SHA

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-gateway-latest'
    waitFor: ['build-gateway']
    args:
      - push
      - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/gateway:latest

  # ── Agents ───────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-agents'
    args:
      - build
      - -f
      - apps/agents/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/agents:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/agents:latest
      - apps/agents

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-agents-sha'
    waitFor: ['build-agents']
    args:
      - push
      - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/agents:$COMMIT_SHA

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-agents-latest'
    waitFor: ['build-agents']
    args:
      - push
      - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/agents:latest

  # ── Migraciones DB ───────────────────────────────────────────────────────
  - name: 'node:22-slim'
    id: 'migrate-db'
    waitFor: ['push-gateway-sha', 'push-agents-sha']
    entrypoint: 'bash'
    secretEnv: ['DATABASE_URL']
    args:
      - '-c'
      - |
        apt-get update -q && apt-get install -y -q wget
        npm install -g pnpm@11.1.2 --silent
        wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64 -O /cloud-sql-proxy
        chmod +x /cloud-sql-proxy
        mkdir -p /cloudsql
        /cloud-sql-proxy --unix-socket=/cloudsql fractal-tesseract:us-central1:tesseract-db &
        sleep 3
        pnpm install --frozen-lockfile --silent
        DATABASE_URL=$$DATABASE_URL pnpm --filter @tesseract/database exec prisma migrate deploy

  # ── Deploy a Cloud Run ────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-gateway'
    waitFor: ['migrate-db']
    args:
      - gcloud
      - run
      - deploy
      - gateway
      - --image=us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/gateway:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-agents'
    waitFor: ['migrate-db']
    args:
      - gcloud
      - run
      - deploy
      - agents
      - --image=us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/agents:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed

images:
  - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/gateway:$COMMIT_SHA
  - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/gateway:latest
  - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/agents:$COMMIT_SHA
  - us-central1-docker.pkg.dev/fractal-tesseract/tesseract-repo/agents:latest

availableSecrets:
  secretManager:
    - versionName: projects/fractal-tesseract/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL

options:
  logging: CLOUD_LOGGING_ONLY
